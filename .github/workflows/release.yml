# Terraform Provider release workflow.
name: Release

# This GitHub action creates a release when a tag that matches the pattern
# "v*" (e.g. v0.1.0) is created.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      skip-publish:
        description: "Skip publishing? ie don't create a GitHub release."
        type: boolean
        required: false
        default: false
      goreleaser-snapshot:
        description: "Run goreleaser in snapshot mode? this will bypass tag checks."
        required: false
        default: false
        type: boolean
      upload-artifacts:
        description: "Uploading artifacts to workflow"
        required: false
        default: false
        type: boolean

# Releases need permissions to read and write the repository contents.
# GitHub considers creating releases and uploading assets as writing contents.
permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Allow goreleaser to access older tag information.
          fetch-depth: 0

      - name: Dump all inputs
        run: echo "${{ toJSON(inputs) }}"

      - name: Skip Publish for non-release tags
        id: skip-publish
        if: contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'pre') || contains(github.ref, 'rc') || inputs.skip-publish == true
        run: |
          echo "Skipping publish for non-release tags"
          echo "skip-publish=true" >> $GITHUB_OUTPUT
          echo "skip-publish=true" >> $GITHUB_ENV

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: "Setup GPG Key"
        run: |
          # Configure GPG for CI environment
          export GPG_TTY=$(tty)
          echo "GPG_TTY=$GPG_TTY" >> $GITHUB_ENV

          # Write key to temp file
          gpgkey="$(mktemp -t gpgkey.XXX)"
          base64 -d <<<"$GPG_KEY" > "$gpgkey"

          # Debug: Check key format
          echo "=== GPG Key Format Debug ==="
          if head -1 "$gpgkey" | grep -q "BEGIN PGP"; then
            echo "Detected ASCII armored key format"
            KEY_FORMAT="ascii"
          else
            echo "Detected binary key format"
            KEY_FORMAT="binary"
            # For binary keys, we might need different handling
            file "$gpgkey" || true
          fi

          # Configure GPG agent for non-interactive use
          echo "=== Configuring GPG Agent ==="
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          echo "use-agent" >> ~/.gnupg/gpg.conf
          echo "batch" >> ~/.gnupg/gpg.conf

          # Start gpg-agent if needed
          gpg-agent --daemon --allow-loopback-pinentry --default-cache-ttl 7200 || true

          # Import the key with passphrase
          echo "=== Importing GPG Key ==="
          if ! DISPLAY="" gpg --batch --yes --pinentry-mode=loopback --passphrase="$GPG_PASSPHRASE" --import "$gpgkey"; then
            echo "Error: Failed to import GPG key"
            echo "Key file size: $(wc -c < "$gpgkey")"
            echo "First few bytes (hex): $(hexdump -C "$gpgkey" | head -3)"
            exit 1
          fi

          # Extract key ID
          echo "=== Extracting Key ID ==="
          KEY_ID=$(gpg --import --import-options show-only --with-colons "$gpgkey" 2>/dev/null | grep -E '^(sec|pub):' | cut -d: -f5 | head -1)

          if [ -z "$KEY_ID" ]; then
            echo "Error: Could not extract key ID from GPG key"
            echo "Debug: GPG key info:"
            gpg --import --import-options show-only --with-colons "$gpgkey" 2>&1 || true
            echo "Available keys:"
            gpg --list-secret-keys --with-colons || true
            exit 1
          fi

          echo "Successfully extracted key ID: $KEY_ID"
          echo "GPG_FINGERPRINT=$KEY_ID" >> $GITHUB_ENV

          # Test signing to verify passphrase works
          echo "=== Testing GPG Signing ==="
          echo "test" | DISPLAY="" gpg --batch --yes --pinentry-mode=loopback --passphrase="$GPG_PASSPHRASE" --armor --sign --local-user "$KEY_ID" > /dev/null
          echo "GPG signing test successful"

          # Clean up temp file
          rm "$gpgkey"
          echo "GPG key setup completed successfully"
        env:
          GPG_KEY: "${{ secrets.GPG_KEY }}"
          GPG_PASSPHRASE: "${{ secrets.GPG_PASSPHRASE }}"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          args: >
            release
            --config .goreleaser.yml
            --clean
            --timeout 30m
            ${{ steps.skip-publish.outputs.skip-publish == 'true' && '--skip=publish' || '' }}
            ${{ inputs.goreleaser-snapshot == true && '--snapshot' || '' }}
        env:
          # GitHub sets the GITHUB_TOKEN secret automatically.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NFPM_DEFAULT_RPM_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GPG_TTY: ${{ env.GPG_TTY }}

      - name: Upload artifacts
        if: ${{ inputs.upload-artifacts == true }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: terraform-artifacts
          path: |
            dist/*.zip
            dist/*_SHA256SUMS
            dist/*.sig
            dist/*.json
          retention-days: 3
