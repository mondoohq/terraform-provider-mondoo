packs:
  - uid: linux-mixed-queries
    name: Linux Mixed Queries 2
    filters:
      - mql: asset.family.contains("unix")
    queries:
      - title: Find all SSH packages that are installed
        uid: ssh-packages
        mql: |
          packages.where(name == /ssh/)
      - title: Get SSH services
        uid: ssh-services
        mql: |
          services.where(name == /ssh/)
      - title: All the SSH config
        uid: ssh-config
        mql: |
          sshd.config.params